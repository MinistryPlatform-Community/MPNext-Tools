name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install

      - run: npm run test:coverage

      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage/coverage-final.json
          fail_ci_if_error: false
